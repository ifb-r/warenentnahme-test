<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Item Withdrawal Request</title>
<style>
  /* ── Reset & base ─────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --brand:       #0f6cbd;
    --brand-dark:  #0c5a9e;
    --brand-light: #e8f3fb;
    --success:     #107c10;
    --warn:        #d83b01;
    --gray-1:      #f5f5f5;
    --gray-2:      #e0e0e0;
    --gray-3:      #888;
    --text:        #1a1a1a;
    --radius:      8px;
    --shadow:      0 2px 8px rgba(0,0,0,.12);
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--gray-1); color: var(--text); min-height: 100vh; }

  /* ── Top bar ──────────────────────────────────── */
  header { background: var(--brand); color: #fff; padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); position: sticky; top: 0; z-index: 100; }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: .3px; }

  /* ── Main layout ──────────────────────────────── */
  main { max-width: 960px; margin: 28px auto; padding: 0 16px 60px; }

  /* ── Cards ────────────────────────────────────── */
  .card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 20px; }
  .card-title { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: var(--brand); border-bottom: 1px solid var(--gray-2); padding-bottom: 10px; }

  /* ── Form elements ────────────────────────────── */
  .form-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; }
  label { font-size: 12px; font-weight: 600; color: var(--gray-3); text-transform: uppercase; letter-spacing: .4px; }
  select, input[type=text], input[type=number], textarea {
    border: 1px solid var(--gray-2); border-radius: 5px; padding: 8px 10px;
    font-size: 14px; font-family: inherit; background: #fff; color: var(--text);
    transition: border-color .15s;
  }
  select:focus, input:focus, textarea:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(15,108,189,.12); }
  textarea { resize: vertical; min-height: 60px; }

  /* ── Buttons ──────────────────────────────────── */
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 18px; border-radius: 5px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; transition: background .15s, opacity .15s; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn-primary { background: var(--brand); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--brand-dark); }
  .btn-success { background: var(--success); color: #fff; }
  .btn-success:hover:not(:disabled) { background: #0a5e0a; }
  .btn-ghost { background: transparent; color: var(--brand); border: 1px solid var(--brand); }
  .btn-ghost:hover:not(:disabled) { background: var(--brand-light); }
  .btn-danger { background: transparent; color: var(--warn); border: 1px solid var(--warn); padding: 4px 10px; font-size: 13px; }
  .btn-danger:hover:not(:disabled) { background: #fdf0ec; }

  /* ── Search dropdowns (items, employees) ──────── */
  #searchWrapper, #vendorSearchWrapper { position: relative; }
  #itemSearchInput, #vendorSearchInput { width: 100%; }
  #searchDropdown, .search-dropdown {
    position: absolute; top: 100%; left: 0; right: 0; background: #fff;
    border: 1px solid var(--gray-2); border-top: none; border-radius: 0 0 6px 6px;
    max-height: 220px; overflow-y: auto; z-index: 50; box-shadow: var(--shadow);
    display: none;
  }
  #searchDropdown.open, .search-dropdown.open { display: block; }
  .search-item { padding: 9px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--gray-1); }
  .search-item:hover, .search-item.highlighted { background: var(--brand-light); }
  .search-item .item-no { font-weight: 600; color: var(--brand); margin-right: 8px; }
  .search-item .item-uom { color: var(--gray-3); font-size: 12px; margin-left: 6px; }

  /* ── Basket table ─────────────────────────────── */
  .basket-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .basket-table th { text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--gray-3); padding: 6px 10px; border-bottom: 2px solid var(--gray-2); }
  .basket-table td { padding: 9px 10px; border-bottom: 1px solid var(--gray-1); vertical-align: middle; }
  .basket-table tr:last-child td { border-bottom: none; }
  .basket-table input[type=number] { width: 80px; text-align: right; }
  .qty-warn { color: var(--warn); font-size: 12px; }
  .empty-basket { text-align: center; color: var(--gray-3); padding: 28px; font-size: 14px; }

  /* ── Toast ────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #222; color: #fff; padding: 12px 22px; border-radius: 6px;
    font-size: 14px; opacity: 0; transition: opacity .25s, transform .25s; z-index: 999;
    max-width: 420px; text-align: center; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.success { background: var(--success); }
  #toast.error   { background: var(--warn); }

  /* ── Spinner ──────────────────────────────────── */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Responsive ───────────────────────────────── */
  @media (max-width: 600px) {
    .form-row { flex-direction: column; }
    .basket-table th:nth-child(4), .basket-table td:nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     CONFIGURATION  ← set your deployed Worker URL here
     ══════════════════════════════════════════════ -->
<script>
// This app no longer talks to Business Central directly, and no longer
// requires the employee to sign in with a Microsoft account. Instead,
// it calls a small Cloudflare Worker, which holds the Azure AD app
// credentials server-side and proxies requests to Business Central.
// See: Vergleich_Hosting_Optionen.docx, Abschnitt 4 (Client Credentials
// Flow) for the background on why this change was made.
const CONFIG = {
  workerBase: 'https://warenentnahme-api.andrea-reichert.workers.dev',
};
</script>

<!-- ══════════════════════════════════════════════
     HTML STRUCTURE
     ══════════════════════════════════════════════ -->
<header>
  <h1>📦 Warenentnahme-Anforderung</h1>
</header>

<main id="appRoot">
  <!-- App content is shown immediately - no login required, since the
       app now talks to a backend Worker that authenticates itself to
       Business Central (Client Credentials Flow) instead of requiring
       each employee to sign in with their own Microsoft account. -->
  <div id="appContent" style="display:block">

    <!-- Step 1: Request details -->
    <div class="card">
      <div class="card-title">1 · Anforderungsdetails</div>
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <label>Mitarbeiter (Kreditor)</label>
          <div id="vendorSearchWrapper" style="position:relative">
            <input id="vendorSearchInput" type="text" placeholder="Name oder Nummer eingeben…"
                   oninput="onVendorSearch()" onkeydown="onVendorSearchKey(event)" autocomplete="off" />
            <div id="vendorSearchDropdown" class="search-dropdown"></div>
          </div>
        </div>
        <div class="form-group" style="flex:1">
          <label>Lagerort</label>
          <select id="locationSelect">
            <option value="">— Lädt… —</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Bemerkung (optional)</label>
          <textarea id="remarkInput" placeholder="Grund für diese Warenentnahme…"></textarea>
        </div>
      </div>
    </div>

    <!-- Step 2: Add items -->
    <div class="card">
      <div class="card-title">2 · Artikel hinzufügen</div>
      <div class="form-row" style="align-items:flex-end">
        <div class="form-group" style="flex:3">
          <label>Artikel suchen</label>
          <div id="searchWrapper">
            <input id="itemSearchInput" type="text" placeholder="Artikelnr. oder Beschreibung eingeben…"
                   oninput="onItemSearch()" onkeydown="onSearchKey(event)" autocomplete="off" />
            <div id="searchDropdown"></div>
          </div>
        </div>
        <div class="form-group" style="flex:0 0 100px">
          <label>Menge</label>
          <input id="qtyInput" type="number" min="0.001" step="1" value="1" />
        </div>
        <div style="padding-bottom:1px">
          <button class="btn btn-primary" onclick="addToBasket()" id="btnAdd">
            + Hinzufügen
          </button>
        </div>
      </div>
    </div>

    <!-- Step 3: Basket -->
    <div class="card">
      <div class="card-title">3 · Warenkorb <span id="basketCount" style="color:var(--gray-3);font-weight:400;font-size:13px"></span></div>
      <div id="basketContainer">
        <p class="empty-basket">Noch keine Artikel hinzugefügt.</p>
      </div>
      <div style="display:flex; justify-content:flex-end; margin-top:16px; gap:10px">
        <button class="btn btn-ghost" onclick="clearBasket()">Warenkorb leeren</button>
        <button class="btn btn-success" id="btnSubmit" onclick="submitRequest()" disabled>
          ✔ Anfrage absenden
        </button>
      </div>
    </div>

    <!-- My requests -->
    <div class="card">
      <div class="card-title" style="display:flex;justify-content:space-between;align-items:center">
        <span>Meine Anfragen</span>
        <button class="btn btn-ghost" style="font-size:12px;padding:5px 12px" onclick="loadMyRequests()">↻ Aktualisieren</button>
      </div>
      <div id="myRequestsContainer"><p class="empty-basket">Bitte zuerst einen Mitarbeiter auswählen, um die zugehörigen Anfragen anzuzeigen.</p></div>
    </div>

  </div><!-- /appContent -->
</main>

<div id="toast"></div>

<!-- ══════════════════════════════════════════════
     APPLICATION LOGIC
     ══════════════════════════════════════════════ -->
<script>
'use strict';

// ── App state ──────────────────────────────────────
let allItems      = [];
let filteredItems = [];
let selectedItem  = null;
let basket        = [];
let highlightIdx  = -1;
let allVendors      = [];
let filteredVendors = [];
let selectedVendor  = null;
let vendorHighlightIdx = -1;

function setLoadStatus(text, isError = false) {
  const el = document.getElementById('loadStatus');
  if (el) {
    el.textContent = text;
    el.style.color = isError ? 'var(--warn)' : 'var(--gray-3)';
  }
}

// ── Bootstrap ──────────────────────────────────────
// No login is required: this app talks to a Cloudflare Worker
// (CONFIG.workerBase) which authenticates itself to Business Central
// using its own app identity (Client Credentials Flow). The Worker
// holds the Azure AD client secret server-side; the browser never
// sees it and never needs a Microsoft sign-in popup or redirect.
(async () => {
  try {
    await initApp();
  } catch (e) {
    setLoadStatus('⚠ Initialization error: ' + e.message, true);
    console.error('App bootstrap failed:', e);
  }
})();

// ── Worker API helpers ─────────────────────────────
// These replace the old bcGet()/bcPost() pair, which called Business
// Central directly using a per-user MSAL access token. Now every call
// goes to our own Worker, which proxies to Business Central using its
// own app-level credentials.
async function workerGet(path) {
  const url = `${CONFIG.workerBase}${path}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Worker error ${res.status}: ${await res.text()}`);
  return res.json();
}

async function workerPost(path, body) {
  const url = `${CONFIG.workerBase}${path}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error(`Worker error ${res.status}: ${await res.text()}`);
  return res.json();
}

// ── Init ─────────────────────────────────────────
async function initApp() {
  setLoadStatus('Lädt…');
  await Promise.all([loadVendors(), loadLocations(), loadItems()]);
  showNoVendorSelectedHint();
  setLoadStatus('');
}

// ── Load master data ─────────────────────────────
async function loadVendors() {
  try {
    const data = await workerGet(`/employees`);
    allVendors = data.value || [];
  } catch (e) {
    showToast('Mitarbeiter konnten nicht geladen werden: ' + e.message, 'error');
  }
}

async function loadLocations() {
  try {
    const data = await workerGet(`/locations`);
    const sel = document.getElementById('locationSelect');
    sel.innerHTML = '';
    (data.value || []).forEach(l => {
      const opt = document.createElement('option');
      opt.value       = l.code;
      opt.textContent = `${l.code}${l.name ? ' · ' + l.name : ''}`;
      sel.appendChild(opt);
    });
    // Standard-Lagerort UG1 vorbelegen, falls vorhanden. Der Mitarbeiter
    // kann den Wert weiterhin frei über das Dropdown ändern.
    if ([...sel.options].some(o => o.value === 'UG1')) {
      sel.value = 'UG1';
    }
  } catch (e) {
    showToast('Lagerorte konnten nicht geladen werden: ' + e.message, 'error');
  }
}

async function loadItems() {
  try {
    const data = await workerGet(`/items`);
    allItems = data.value || [];
  } catch (e) {
    showToast('Artikelkatalog konnte nicht geladen werden: ' + e.message, 'error');
  }
}

// ── Item search ───────────────────────────────────
function onItemSearch() {
  const q = document.getElementById('itemSearchInput').value.trim().toLowerCase();
  const dd = document.getElementById('searchDropdown');
  selectedItem = null;
  highlightIdx = -1;

  if (q.length < 1) { dd.classList.remove('open'); dd.innerHTML = ''; return; }

  filteredItems = allItems.filter(i =>
    i.no.toLowerCase().includes(q) ||
    (i.description || '').toLowerCase().includes(q)
  ).slice(0, 40);

  if (filteredItems.length === 0) {
    dd.innerHTML = '<div class="search-item" style="color:var(--gray-3)">Keine Artikel gefunden</div>';
    dd.classList.add('open');
    return;
  }

  dd.innerHTML = filteredItems.map((i, idx) =>
    `<div class="search-item" data-idx="${idx}"
          onmousedown="selectItem(${idx})">
       <span class="item-no">${esc(i.no)}</span>${esc(i.description || '')}
       <span class="item-uom">${esc(i.baseUnitOfMeasure || '')}</span>
     </div>`
  ).join('');
  dd.classList.add('open');
}

function onSearchKey(e) {
  const dd = document.getElementById('searchDropdown');
  const items = dd.querySelectorAll('.search-item[data-idx]');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    highlightIdx = Math.min(highlightIdx + 1, items.length - 1);
    refreshHighlight(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    highlightIdx = Math.max(highlightIdx - 1, 0);
    refreshHighlight(items);
  } else if (e.key === 'Enter') {
    if (highlightIdx >= 0) selectItem(highlightIdx);
  } else if (e.key === 'Escape') {
    dd.classList.remove('open');
  }
}

function refreshHighlight(items) {
  items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightIdx));
  if (highlightIdx >= 0) items[highlightIdx].scrollIntoView({ block: 'nearest' });
}

function selectItem(idx) {
  selectedItem = filteredItems[idx];
  document.getElementById('itemSearchInput').value =
    `${selectedItem.no} · ${selectedItem.description || ''}`;
  document.getElementById('searchDropdown').classList.remove('open');
  document.getElementById('qtyInput').focus();
}

document.addEventListener('click', e => {
  if (!document.getElementById('searchWrapper').contains(e.target))
    document.getElementById('searchDropdown').classList.remove('open');
  if (!document.getElementById('vendorSearchWrapper').contains(e.target))
    document.getElementById('vendorSearchDropdown').classList.remove('open');
});

// ── Basket ────────────────────────────────────────
function addToBasket() {
  if (!selectedItem) { showToast('Bitte zuerst einen Artikel auswählen.', 'error'); return; }
  const qty = parseFloat(document.getElementById('qtyInput').value);
  if (!qty || qty <= 0) { showToast('Bitte eine Menge größer 0 eingeben.', 'error'); return; }

  // Merge if same item + location
  const loc = document.getElementById('locationSelect').value;
  const existing = basket.find(b => b.itemNo === selectedItem.no && b.locationCode === loc);
  if (existing) {
    existing.quantity += qty;
  } else {
    basket.push({
      itemNo:       selectedItem.no,
      description:  selectedItem.description || '',
      uom:          selectedItem.baseUnitOfMeasure || '',
      quantity:     qty,
      locationCode: loc,
    });
  }

  renderBasket();
  // Reset search
  selectedItem = null;
  document.getElementById('itemSearchInput').value = '';
  document.getElementById('qtyInput').value = '1';
  document.getElementById('itemSearchInput').focus();
}

function removeFromBasket(idx) {
  basket.splice(idx, 1);
  renderBasket();
}

function updateQty(idx, val) {
  basket[idx].quantity = parseFloat(val) || 0;
  renderBasket();
}

function clearBasket() {
  basket = [];
  renderBasket();
}

function renderBasket() {
  const el  = document.getElementById('basketContainer');
  const btn = document.getElementById('btnSubmit');
  const cnt = document.getElementById('basketCount');
  cnt.textContent = basket.length ? `(${basket.length} line${basket.length > 1 ? 's' : ''})` : '';

  if (basket.length === 0) {
    el.innerHTML = '<p class="empty-basket">Noch keine Artikel hinzugefügt.</p>';
    btn.disabled = true;
    return;
  }

  btn.disabled = !selectedVendor;

  el.innerHTML = `
    <table class="basket-table">
      <thead>
        <tr>
          <th>Artikelnr.</th>
          <th>Beschreibung</th>
          <th>Menge</th>
          <th>ME</th>
          <th>Lagerort</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${basket.map((b, i) => `
          <tr>
            <td><strong>${esc(b.itemNo)}</strong></td>
            <td>${esc(b.description)}</td>
            <td>
              <input type="number" min="0.001" step="1" value="${b.quantity}"
                     onchange="updateQty(${i}, this.value)" />
            </td>
            <td>${esc(b.uom)}</td>
            <td>${esc(b.locationCode)}</td>
            <td><button class="btn btn-danger" onclick="removeFromBasket(${i})">✕</button></td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

function onVendorSearch() {
  const q = document.getElementById('vendorSearchInput').value.trim().toLowerCase();
  const dd = document.getElementById('vendorSearchDropdown');
  selectedVendor = null;
  vendorHighlightIdx = -1;
  renderBasket();
  showNoVendorSelectedHint();

  if (q.length < 1) { dd.classList.remove('open'); dd.innerHTML = ''; return; }

  filteredVendors = allVendors.filter(v =>
    v.no.toLowerCase().includes(q) ||
    (v.name || '').toLowerCase().includes(q)
  ).slice(0, 40);

  if (filteredVendors.length === 0) {
    dd.innerHTML = '<div class="search-item" style="color:var(--gray-3)">Keine Mitarbeiter gefunden</div>';
    dd.classList.add('open');
    return;
  }

  dd.innerHTML = filteredVendors.map((v, idx) =>
    `<div class="search-item" data-idx="${idx}"
          onmousedown="selectVendor(${idx})">
       <span class="item-no">${esc(v.no)}</span>${esc(v.name || '')}
     </div>`
  ).join('');
  dd.classList.add('open');
}

function onVendorSearchKey(e) {
  const dd = document.getElementById('vendorSearchDropdown');
  const items = dd.querySelectorAll('.search-item[data-idx]');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    vendorHighlightIdx = Math.min(vendorHighlightIdx + 1, items.length - 1);
    refreshVendorHighlight(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    vendorHighlightIdx = Math.max(vendorHighlightIdx - 1, 0);
    refreshVendorHighlight(items);
  } else if (e.key === 'Enter') {
    if (vendorHighlightIdx >= 0) selectVendor(vendorHighlightIdx);
  } else if (e.key === 'Escape') {
    dd.classList.remove('open');
  }
}

function refreshVendorHighlight(items) {
  items.forEach((el, i) => el.classList.toggle('highlighted', i === vendorHighlightIdx));
  if (vendorHighlightIdx >= 0) items[vendorHighlightIdx].scrollIntoView({ block: 'nearest' });
}

function selectVendor(idx) {
  selectedVendor = filteredVendors[idx];
  document.getElementById('vendorSearchInput').value =
    `${selectedVendor.no} · ${selectedVendor.name || ''}`;
  document.getElementById('vendorSearchDropdown').classList.remove('open');
  renderBasket();
  loadMyRequests();
}

function showNoVendorSelectedHint() {
  if (selectedVendor) return;
  const el = document.getElementById('myRequestsContainer');
  el.innerHTML = '<p class="empty-basket">Bitte zuerst einen Mitarbeiter auswählen, um die zugehörigen Anfragen anzuzeigen.</p>';
}

// ── Submit ────────────────────────────────────────
async function submitRequest() {
  const vendorNo = selectedVendor ? selectedVendor.no : '';
  const remark   = document.getElementById('remarkInput').value.trim();

  if (!vendorNo) { showToast('Bitte einen Mitarbeiter auswählen.', 'error'); return; }
  if (basket.length === 0) { showToast('Der Warenkorb ist leer.', 'error'); return; }

  const btn = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Wird gesendet…';

  try {
    const header = await workerPost('/requests', {
      employeeNo: vendorNo,
      remark,
      lines: basket.map(line => ({
        itemNo:       line.itemNo,
        quantity:     line.quantity,
        locationCode: line.locationCode,
      })),
    });

    showToast(`✔ Anfrage ${header.no} erfolgreich gesendet!`, 'success');
    clearBasket();
    document.getElementById('remarkInput').value = '';
    await loadMyRequests();

  } catch (e) {
    showToast('Fehler: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '✔ Anfrage absenden';
    renderBasket();
  }
}

// ── My Requests ───────────────────────────────────
async function loadMyRequests() {
  const vendorNo = selectedVendor ? selectedVendor.no : '';
  if (!vendorNo) {
    showNoVendorSelectedHint();
    return;
  }

  const el = document.getElementById('myRequestsContainer');
  el.innerHTML = '<p class="empty-basket">Lädt…</p>';

  try {
    const url = `/requests?employeeNo=${encodeURIComponent(vendorNo)}`;

    const data = await workerGet(url);
    const rows = data.value || [];

    if (rows.length === 0) {
      el.innerHTML = '<p class="empty-basket">Keine Anfragen gefunden.</p>';
      return;
    }

    const statusColor = { Open: '#0f6cbd', Approved: '#107c10', 'In Progress': '#986f0b', Posted: '#107c10', Rejected: '#d83b01' };

    el.innerHTML = `
      <table class="basket-table">
        <thead>
          <tr><th>Nr.</th><th>Datum</th><th>Mitarbeiter</th><th>Status</th><th>Bemerkung</th><th>Bearbeitet von</th></tr>
        </thead>
        <tbody>
          ${rows.map(r => `
            <tr>
              <td><strong>${esc(r.no)}</strong></td>
              <td>${r.requestDate ? r.requestDate.substring(0,10) : '–'}</td>
              <td>${esc(r.employeeName || r.employeeNo)}</td>
              <td><span style="color:${statusColor[r.status] || '#333'};font-weight:600">${esc(r.status)}</span></td>
              <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(r.remark || '')}</td>
              <td>${esc(r.processedBy || '–')}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
  } catch (e) {
    el.innerHTML = `<p class="empty-basket" style="color:var(--warn)">Anfragen konnten nicht geladen werden: ${esc(e.message)}</p>`;
  }
}

// ── Toast ─────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 4000);
}

// ── Util ──────────────────────────────────────────
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
